<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey to the Secret Lily</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- پس‌زمینه ثابت -->
  <div class="global-bg"></div>
  <div class="global-stars" id="globalStars"></div>

  <!-- صفحه شروع -->
  <section id="intro" class="screen intro-screen active">
    <div class="intro-card">
      <h1 class="game-title">Journey to the Secret Lily</h1>
      <h2 class="game-subtitle">سفر رز تا لیلیوم پنهان</h2>

      <p class="game-desc">
        رز باید از مسیر ستاره‌ها، پل شکسته و رازهای شب عبور کند تا
        به کلید ماه و دروازه‌ی بعدی برسد...
      </p>

      <div class="intro-tags">
        <span>✨ ستاره‌ها</span>
        <span>🦉 لومی</span>
        <span>🌙 رازآلود</span>
        <span>🗝️ کلید ماه</span>
      </div>

      <button id="startBtn" class="start-btn">شروع سفر</button>
    </div>
  </section>

  <!-- مرحله 1 -->
  <section id="stage1" class="screen stage-screen">
    <div class="stage-wrap">

      <!-- هدر مرحله -->
      <div class="hud">
        <div class="hud-box" id="moonKeyStatus">🗝️ کلید ماه: پیدا نشده</div>
        <div class="hud-box big">مرحله ۱</div>
      </div>

      <div class="stage-title-box">
        <div class="stage-title">راه ستاره‌ها و پل شکسته</div>
        <div class="stage-subtitle">پیشروی رز</div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- زمین بازی -->
      <div id="gameArea" class="game-area">

        <!-- ماه -->
        <div class="moon"></div>

        <!-- تپه‌ها -->
        <div class="hill hill-1"></div>
        <div class="hill hill-2"></div>
        <div class="hill hill-3"></div>

        <!-- جغد لومی -->
        <div id="owlLumi" class="owl-lumi">
          <div class="owl-body">
            <div class="owl-eye left"></div>
            <div class="owl-eye right"></div>
            <div class="owl-beak"></div>
          </div>
        </div>

        <!-- دروازه -->
        <div id="moonGate" class="moon-gate">
          <div class="gate-inner">
            <div class="gate-crescent"></div>
            <div class="gate-text">دروازه ماه</div>
            <div class="gate-locked" id="gateLockedText">قفل است</div>
          </div>
        </div>

        <!-- کلید -->
        <div id="moonKey" class="moon-key">🗝️</div>

        <!-- رز -->
        <div id="player" class="player">
          <div class="hair"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>

        <!-- زمین -->
        <div class="ground">
          <div class="bridge bridge-left"></div>
          <div class="bridge-gap"></div>
          <div class="bridge bridge-right"></div>
        </div>

      </div>

      <!-- کنترل‌ها -->
      <div class="controls" id="controls">
        <button class="ctrl-btn" id="moveRightBtn">▶</button>
        <button class="ctrl-btn" id="jumpBtn">↑</button>
        <button class="ctrl-btn" id="moveLeftBtn">◀</button>
      </div>

    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
